name: github pages

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '2.7'
          bundler-cache: true

      - name: Cache Jekyll
        uses: actions/cache@v4
        with:
          path: |
            .jekyll-cache
            _site
          key: ${{ runner.os }}-jekyll-${{ hashFiles('**/*.md', '**/*.html', '_config.yml', 'Gemfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-jekyll-

      - name: Build Jekyll site
        env:
          TZ: "Asia/Tokyo"
          JEKYLL_ENV: production
        run: bundle exec jekyll build

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
